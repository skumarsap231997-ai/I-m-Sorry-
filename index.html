<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sorry</title><style>body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#222;color:#fff;font-family:Arial}.container{text-align:center;background:rgba(255,255,255,.15);padding:30px;border-radius:20px}button{padding:12px 24px;margin:10px;font-size:20px;border-radius:25px;border:none}#overlay{display:none;position:fixed;inset:0;justify-content:center;align-items:center;flex-direction:column;background:rgba(0,0,0,.4);font-size:90px}</style></head><body><div class="container"><h1>🥺 Will you forgive me?</h1><button id="yesBtn" onclick="yesClicked()">Yes ❤️</button><button id="noBtn">No 😒</button></div><div id="overlay"><div>🐱🤗💋</div><div style="font-size:28px">Sending you a hug and kiss ❤️</div></div><audio id="voiceMessage"><source src="voice.mp3" type="audio/mpeg"></audio><script>const n=document.getElementById('noBtn');document.addEventListener('mousemove',e=>{const r=n.getBoundingClientRect();if(Math.hypot(e.clientX-(r.left+r.width/2),e.clientY-(r.top+r.height/2))<120){n.style.position='fixed';n.style.left=Math.random()*(innerWidth-r.width-20)+'px';n.style.top=Math.random()*(innerHeight-r.height-20)+'px';}});function yesClicked(){document.querySelector('.container').style.display='none';document.getElementById('overlay').style.display='flex';document.getElementById('voiceMessage').play().catch(()=>{});}</script></body></html>
