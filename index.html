<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial,sans-serif;
background:linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),url("background.jpg");
background-size:cover;background-position:center;display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;text-align:center}
.emoji{position:absolute;font-size:35px;animation:float 12s linear infinite;opacity:.75;pointer-events:none}
@keyframes float{from{transform:translateY(110vh) rotate(0)}to{transform:translateY(-120vh) rotate(360deg)}}
.container{background:rgba(255,255,255,.18);backdrop-filter:blur(15px);padding:35px;border-radius:25px;border:1px solid rgba(255,255,255,.3);box-shadow:0 8px 30px rgba(0,0,0,.25);z-index:10}
button{padding:14px 28px;font-size:20px;border:none;border-radius:30px;margin:15px;cursor:pointer}
#yesBtn{background:#ff4f8b;color:#fff}
#noBtn{background:#fff;color:#444;position:relative}
</style>
</head>
<body>
<div class="container">
<h1>🥺 Will you forgive me? ❤️</h1>
<p style="color:white">I really didn't mean to hurt you... 💖</p>
<button id="yesBtn" onclick="yesClicked()">Yes ❤️</button>
<button id="noBtn">No 😒</button>
</div>

<audio id="voiceMessage" preload="auto">
<source src="voice.mp3" type="audio/mpeg">
</audio>

<script>
const emojis=["🥺","🥹","😊","💖","✨","💕","🌸","🫶","❤️"];
for(let i=0;i<40;i++){
 let e=document.createElement("div");
 e.className="emoji";
 e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
 e.style.left=Math.random()*100+"vw";
 e.style.animationDuration=(8+Math.random()*8)+"s";
 document.body.appendChild(e);
}
const noBtn=document.getElementById("noBtn");
document.addEventListener("mousemove",(ev)=>{
 const r=noBtn.getBoundingClientRect();
 const cx=r.left+r.width/2, cy=r.top+r.height/2;
 const d=Math.hypot(ev.clientX-cx,ev.clientY-cy);
 if(d<120){
   noBtn.style.position="fixed";
   noBtn.style.left=Math.random()*(window.innerWidth-r.width-20)+"px";
   noBtn.style.top=Math.random()*(window.innerHeight-r.height-20)+"px";
 }
});

function yesClicked(){
 const audio=document.getElementById("voiceMessage");
 if(audio){audio.play().catch(()=>{});}
 document.querySelector(".container").style.display="none";
 audio.onended=showEnd;
 if(audio.paused){showEnd();}
}
function showEnd(){
 const card=document.createElement("div");
 card.className="container";
 card.innerHTML=`<h1 style="font-size:52px;color:white">🥹 Thank You ❤️</h1>
 <p style="color:white;font-size:22px">I promise to make everything right 💖</p>
 <div style="font-size:90px;margin:20px">🐱🤗💋</div>
 <p style="color:white">Cute cat hug & kiss just for you! 🫶💕</p>`;
 document.body.appendChild(card);
}
</script>
</body>
</html>
