<!DOCTYPE html>  <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>I'm Sorry ❤️</title>  <style>  
body{  
    margin:0;  
    overflow:hidden;  
    font-family:Arial,sans-serif;  
  
    /* Uses your uploaded image */  
    background:  
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),  
        url("background.jpg");  
  
    background-size:cover;  
    background-position:center;  
    background-repeat:no-repeat;  
  
    display:flex;  
    justify-content:center;  
    align-items:center;  
    height:100vh;  
    flex-direction:column;  
    text-align:center;  
}  
  
/* Floating Emojis */  
  
.emoji{  
    position:absolute;  
    font-size:35px;  
    animation:float 12s linear infinite;  
    opacity:0.75;  
    user-select:none;  
    pointer-events:none;  
}  
  
@keyframes float{  
    from{  
        transform:translateY(110vh) rotate(0deg);  
    }  
    to{  
        transform:translateY(-120vh) rotate(360deg);  
    }  
}  
  
/* Glass Card */  
  
.container{  
    background:rgba(255,255,255,0.18);  
    backdrop-filter:blur(15px);  
    -webkit-backdrop-filter:blur(15px);  
  
    padding:35px;  
    border-radius:25px;  
  
    border:1px solid rgba(255,255,255,0.3);  
  
    box-shadow:0 8px 30px rgba(0,0,0,0.25);  
  
    z-index:10;  
}  
  
h1{  
    color:white;  
    text-shadow:2px 2px 8px rgba(0,0,0,0.5);  
    animation:pulse 2s infinite;  
}  
  
p{  
    color:white;  
    font-size:20px;  
    text-shadow:1px 1px 6px rgba(0,0,0,0.5);  
}  
  
@keyframes pulse{  
    50%{  
        transform:scale(1.05);  
    }  
}  
  
button{  
    padding:14px 28px;  
    font-size:20px;  
    border:none;  
    border-radius:30px;  
    margin:15px;  
    cursor:pointer;  
    transition:0.3s;  
}  
  
#yesBtn{  
    background:#ff4f8b;  
    color:white;  
}  
  
#yesBtn:hover{  
    transform:scale(1.08);  
}  
  
#noBtn{  
    background:white;  
    color:#444;  
}  
</style>  </head>  <body>  <div class="container">  <h1>🥺 Will you forgive me? ❤️</h1>  <p>I really didn't mean to hurt you... 💖</p>  <button id="yesBtn" onclick="yesClicked()">Yes ❤️</button>

<button id="noBtn" onmouseover="moveButton()" onmouseenter="moveButton()">No 😒</button>

</div>  
<audio id="voiceMessage" preload="auto">
    <source src="voice.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<script>  
  
const emojis=["🥺","🥹","😊","💖","✨","💕","🌸","🫶","❤️"];  
  
for(let i=0;i<40;i++){  
  
let e=document.createElement("div");  
  
e.className="emoji";  
  
e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];  
  
e.style.left=Math.random()*100+"vw";  
  
e.style.animationDuration=(8+Math.random()*8)+"s";  
  
e.style.animationDelay=Math.random()*8+"s";  
  
document.body.appendChild(e);  
  
}  
  
function moveButton(){

const btn=document.getElementById("noBtn");

btn.style.position="fixed";

const maxX=window.innerWidth-btn.offsetWidth-20;
const maxY=window.innerHeight-btn.offsetHeight-20;

btn.style.left=Math.random()*maxX+"px";
btn.style.top=Math.random()*maxY+"px";

}  
  
function yesClicked(){

    // Play the voice message
    const audio = document.getElementById("voiceMessage");

    if(audio){
        audio.play().catch(function(err){
            console.log(err);
        });
    }

    // Hide the original card
    document.querySelector(".container").style.display = "none";

    // Create the thank you card
    const thankYouCard = document.createElement("div");

    thankYouCard.className = "container";

    thankYouCard.innerHTML = `
        <h1 style="font-size:55px;">🥹 Thank You ❤️</h1>

        <h2 style="color:white;">
            I promise to make everything right 💖
        </h2>

        <img
            src="https://media.giphy.com/media/ftAwcy5J6JX7G/giphy.gif"
            alt="Cute celebration"
            style="width:260px;max-width:90%;border-radius:18px;margin:20px auto;display:block;"
        />

        <div style="font-size:70px;">
            🫶 🌸 💕 ✨ ❤️
        </div>

        <p style="color:white;font-size:22px;margin-top:15px;">
            You just made my day! 💞
        </p>
    `;

    document.body.appendChild(thankYouCard);

}
  

document.addEventListener("mousemove", function(e){

    const btn = document.getElementById("noBtn");
    const rect = btn.getBoundingClientRect();

    const distance = Math.hypot(
        e.clientX - (rect.left + rect.width/2),
        e.clientY - (rect.top + rect.height/2)
    );

    if(distance < 120){
        moveButton();
    }
});

</script>  </body>  
</html>
