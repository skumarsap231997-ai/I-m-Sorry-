<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffd6e8,#ffeef5,#fff7e6);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    text-align:center;
}

/* Floating Emojis */

.emoji{
    position:absolute;
    font-size:35px;
    animation:float 12s linear infinite;
    opacity:0.7;
}

@keyframes float{
    from{
        transform:translateY(110vh) rotate(0deg);
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}

/* Card */

.container{
    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(10px);
    padding:35px;
    border-radius:25px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    z-index:5;
}

h1{
    color:#ff4081;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.05);
    }
}

button{
    padding:14px 28px;
    font-size:20px;
    border:none;
    border-radius:30px;
    margin:15px;
    cursor:pointer;
    transition:0.3s;
}

#yesBtn{
    background:#ff4f8b;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    background:white;
    color:#444;
}

</style>

</head>

<body>

<div class="container">

<h1>🥺 Will you forgive me? ❤️</h1>

<p>I really didn't mean to hurt you... 💖</p>

<button id="yesBtn" onclick="yesClicked()">Yes ❤️</button>

<button id="noBtn" onmouseover="moveButton()">No 😒</button>

</div>

<script>

// Floating emojis

const emojis=["🥺","🥹","😊","💖","✨","💕","🌸","🫶","❤️"];

for(let i=0;i<35;i++){

let e=document.createElement("div");

e.className="emoji";

e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

e.style.left=Math.random()*100+"vw";

e.style.animationDuration=(8+Math.random()*8)+"s";

e.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(e);

}

// No button runs away

function moveButton(){

const btn=document.getElementById("noBtn");

btn.style.position="absolute";

btn.style.left=Math.random()*(window.innerWidth-120)+"px";

btn.style.top=Math.random()*(window.innerHeight-60)+"px";

}

// Yes clicked

function yesClicked(){

document.body.innerHTML=`

<div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;background:linear-gradient(135deg,#ffd6e8,#fff0f6);font-family:Arial;">

<h1 style="font-size:55px;color:#ff4081;">🥹 Thank You ❤️</h1>

<h2>I promise to make everything right 💖</h2>

<div style="font-size:70px;">🫶 🌸 💕 ✨</div>

</div>

`;

}

</script>

</body>
</html>
