<!-- Add this after </div> and before <script> -->

<audio id="voiceMessage">
    <source src="voice.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<script>

const emojis=["🥺","🥹","😊","💖","✨","💕","🌸","🫶","❤️"];

for(let i=0;i<40;i++){

let e=document.createElement("div");

e.className="emoji";

e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

e.style.left=Math.random()*100+"vw";

e.style.animationDuration=(8+Math.random()*8)+"s";

e.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(e);

}

function moveButton(){

const btn=document.getElementById("noBtn");

btn.style.position="absolute";

btn.style.left=Math.random()*(window.innerWidth-120)+"px";

btn.style.top=Math.random()*(window.innerHeight-60)+"px";

}

function yesClicked(){

    // Start playing the voice message
    const audio = document.getElementById("voiceMessage");
    audio.play();

    // Replace the page with the thank you screen
    document.body.innerHTML = `

    <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        flex-direction:column;
        background:
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
        url('background.jpg');
        background-size:cover;
        background-position:center;
        font-family:Arial,sans-serif;
        text-align:center;
    ">

        <div style="
            background:rgba(255,255,255,0.18);
            backdrop-filter:blur(15px);
            padding:35px;
            border-radius:25px;
            border:1px solid rgba(255,255,255,0.3);
        ">

            <h1 style="font-size:55px;color:white;">🥹 Thank You ❤️</h1>

            <h2 style="color:white;">
                I promise to make everything right 💖
            </h2>

            <div style="font-size:70px;">
                🫶 🌸 💕 ✨ ❤️
            </div>

        </div>

    </div>

    `;

}

</script>
