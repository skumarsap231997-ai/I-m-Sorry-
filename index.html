<!DOCTYPE html>  <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>I'm Sorry ❤️</title>  <style>  
body{  
    margin:0;  
    overflow:hidden;  
    font-family:Arial,sans-serif;  
  
    /* Uses your uploaded image */  
    background:  
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),  
        url("background.jpg");  
  
    background-size:cover;  
    background-position:center;  
    background-repeat:no-repeat;  
  
    display:flex;  
    justify-content:center;  
    align-items:center;  
    height:100vh;  
    flex-direction:column;  
    text-align:center;  
}  
  
/* Floating Emojis */  
  
.emoji{  
    position:absolute;  
    font-size:35px;  
    animation:float 12s linear infinite;  
    opacity:0.75;  
    user-select:none;  
    pointer-events:none;  
}  
  
@keyframes float{  
    from{  
        transform:translateY(110vh) rotate(0deg);  
    }  
    to{  
        transform:translateY(-120vh) rotate(360deg);  
    }  
}  
  
/* Glass Card */  
  
.container{  
    background:rgba(255,255,255,0.18);  
    backdrop-filter:blur(15px);  
    -webkit-backdrop-filter:blur(15px);  
  
    padding:35px;  
    border-radius:25px;  
  
    border:1px solid rgba(255,255,255,0.3);  
  
    box-shadow:0 8px 30px rgba(0,0,0,0.25);  
  
    z-index:10;  
}  
  
h1{  
    color:white;  
    text-shadow:2px 2px 8px rgba(0,0,0,0.5);  
    animation:pulse 2s infinite;  
}  
  
p{  
    color:white;  
    font-size:20px;  
    text-shadow:1px 1px 6px rgba(0,0,0,0.5);  
}  
  
@keyframes pulse{  
    50%{  
        transform:scale(1.05);  
    }  
}  
  
button{  
    padding:14px 28px;  
    font-size:20px;  
    border:none;  
    border-radius:30px;  
    margin:15px;  
    cursor:pointer;  
    transition:0.3s;  
}  
  
.button-container{
    position:relative;
    width:300px;
    height:90px;
    margin:20px auto;
}

#yesBtn{
    position:absolute;
    left:20px;
    top:20px;
    background:#ff4f8b;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    position:absolute;
    left:160px;
    top:20px;
    background:white;
    color:#444;
    transition:0.18s ease;
}

/* Hearts falling after clicking YES */
.heart{
position:fixed;top:-60px;font-size:28px;pointer-events:none;z-index:9999;
animation:fallHeart linear forwards;
}
@keyframes fallHeart{
0%{transform:translateY(-60px) rotate(0deg);opacity:1;}
100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

</style>  </head>  <body>  <div class="container">  <h1>🥺 Will you forgive me? ❤️</h1>  <p>I really didn't mean to hurt you... 💖</p> 
<div class="button-container">
    <button id="yesBtn" onclick="yesClicked()">Yes ❤️</button>
    <button id="noBtn">No 😒</button>
</div>

</div>  
<audio id="voiceMessage" preload="auto">
    <source src="voice.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<script>

const emojis=["🥺","🥹","😊","💖","✨","💕","🌸","🫶","❤️"];

// Floating emojis
for(let i=0;i<40;i++){

    let e=document.createElement("div");

    e.className="emoji";

    e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

    e.style.left=Math.random()*100+"vw";

    e.style.animationDuration=(8+Math.random()*8)+"s";

    e.style.animationDelay=Math.random()*8+"s";

    document.body.appendChild(e);
}


// ----------------------------
// Moving NO button
// ----------------------------

const noBtn = document.getElementById("noBtn");

// Positions around the Yes button
const positions = [
    {left:160, top:20},
    {left:160, top:-15},
    {left:160, top:55},
    {left:100, top:55},
    {left:100, top:-15},
    {left:190, top:40},
    {left:130, top:60},
    {left:180, top:0}
];

let current = 0;

function moveButton(){

    let next;

    do{
        next = Math.floor(Math.random()*positions.length);
    }while(next === current);

    current = next;

    noBtn.style.left = positions[current].left + "px";
    noBtn.style.top = positions[current].top + "px";
}

// Desktop
document.addEventListener("mousemove", function(e){

    const rect = noBtn.getBoundingClientRect();

    const distance = Math.hypot(
        e.clientX - (rect.left + rect.width/2),
        e.clientY - (rect.top + rect.height/2)
    );

    if(distance < 55){
        moveButton();
    }

});

// Mobile
noBtn.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveButton();
});

// ----------------------------
// YES button
// ----------------------------


// Falling hearts animation
function startHeartRain(){
 const hearts=["❤️","💕","💖","💗","💞","💘","🌸","🫶"];
 const interval=setInterval(function(){
   const heart=document.createElement("div");
   heart.className="heart";
   heart.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];
   heart.style.left=Math.random()*100+"vw";
   heart.style.fontSize=(22+Math.random()*30)+"px";
   heart.style.animationDuration=(3+Math.random()*3)+"s";
   document.body.appendChild(heart);
   heart.addEventListener("animationend",()=>heart.remove());
 },120);
 setTimeout(()=>clearInterval(interval),8000);
}

function yesClicked(){
    startHeartRain();


    const audio=document.getElementById("voiceMessage");

    if(audio){
        audio.play().catch(function(err){
            console.log(err);
        });
    }

    document.querySelector(".container").style.display="none";

    const thankYouCard=document.createElement("div");

    thankYouCard.className="container";

    thankYouCard.innerHTML=`

        <h1 style="font-size:55px;">🥹 Thank You ❤️</h1>

        <h2 style="color:white;">
            I promise to make everything right 💖
        </h2>

        <img
        src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
        style="width:260px;max-width:90%;border-radius:18px;margin:20px auto;display:block;"
        >

        <div style="font-size:70px;">
            🫶 🌸 💕 ✨ ❤️
        </div>

        <p style="color:white;font-size:22px;margin-top:15px;">
            You just made my day! 💞
        </p>

    `;

    document.body.appendChild(thankYouCard);

}
  
</script>  </body>  
</html>
